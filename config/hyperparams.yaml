# hyperparams.yaml
# Training configuration for God's Eye

# Model Hyperparameters
backbone: "YOLOv12-m"
neck: "PANet"
input_size: [640, 640]
num_classes: 6
classes: ["Aircraft", "Ship", "Car", "Tank", "Bridge", "Harbor"]

# Training Strategy
epochs: 100
batch_size: 16
initial_lr: 0.01
optimizer: "SGD"  # Options: [SGD, AdamW]
momentum: 0.937
weight_decay: 0.0005
scheduler: "cosine"
loss: "CIoU"

# Augmentation Settings
mosaic: 1.0
mixup: 0.15
random_rotation: 1.0  # 0 to 360 degrees
flip_up_down: 0.0
flip_left_right: 0.5
